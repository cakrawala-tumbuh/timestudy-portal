# ─────────────────────────────────────────────────────────────────────────────
# E2E Test Stack — hanya digunakan oleh GitHub Actions CI
#
# Backend : image GHCR (timestudy-backend:latest)
# Portal  : image lokal yang di-build dari source di CI (timestudy-portal:e2e)
#
# Gunakan via: docker compose -f docker-compose.e2e.yml up -d --wait
# ─────────────────────────────────────────────────────────────────────────────

services:

  backend:
    image: ghcr.io/cakrawala-tumbuh/timestudy-backend:latest
    environment:
      DATABASE_URL: "sqlite:////data/timestudy-e2e.db"
      SECRET_KEY: "e2e-secret-key-not-for-production"
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      REFRESH_TOKEN_EXPIRE_DAYS: 30
      OAUTH_CODE_EXPIRE_SECONDS: 600
      APP_ENV: development
      DEBUG: "false"
      ALLOWED_ORIGINS: '["http://localhost:3000"]'
      FIRST_ADMIN_USERNAME: admin
      FIRST_ADMIN_EMAIL: admin@example.com
      FIRST_ADMIN_PASSWORD: changeme123
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  portal:
    image: timestudy-portal:e2e
    environment:
      BACKEND_URL: "http://backend:8000"
      NEXTAUTH_URL: "http://localhost:3000"
      NEXTAUTH_SECRET: "e2e-nextauth-secret-not-for-production"
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "require('http').get('http://localhost:3000/', (r)=>{ process.exit(r.statusCode<400?0:1) })"
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
