name: CI

on:
  pull_request:
    branches: ["master"]
  workflow_dispatch:

jobs:
  e2e:
    name: E2E Tests (Docker)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout portal
        uses: actions/checkout@v4

      - name: Checkout backend source
        uses: actions/checkout@v4
        with:
          repository: cakrawala-tumbuh/timestudy-backend
          path: .backend-src

      - name: Build images for e2e
        run: |
          docker build -t timestudy-portal:e2e .
          docker build -t timestudy-backend:e2e .backend-src

      - name: Start backend + portal
        run: docker compose -f docker-compose.e2e.yml up -d --wait --timeout 120

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright + Chromium
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests
        run: npx playwright test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results-${{ github.run_id }}
          path: |
            test-results/
            ~/playwright-report/
          if-no-files-found: ignore

      - name: Tear down services
        if: always()
        run: docker compose -f docker-compose.e2e.yml down -v

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

      - name: Lint
        run: npm run lint
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test -- --coverage --passWithNoTests
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
